version: "3.9"

# Production compose — uses Supabase (no local DB service).
# Copy backend/.env.example → backend/.env and fill all values before running.
#
# Deploy:
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod   # multi-stage: vite build → nginx static serve
    restart: unless-stopped
    depends_on:
      - backend
    # nginx serves the SPA and reverse-proxies /api → backend:8000 (see frontend/nginx.conf)
    ports:
      - "80:80"
