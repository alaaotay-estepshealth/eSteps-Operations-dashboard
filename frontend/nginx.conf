# nginx config for the production frontend image (Dockerfile.prod).
# Serves the built SPA and reverse-proxies /api → backend (matches the dev Vite
# proxy: the /api prefix is stripped so FastAPI routes stay at the root).

upstream backend_api {
    # "backend" is the service name in docker-compose.prod.yml.
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers (HSTS is best terminated at the TLS edge / load balancer).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # API: strip the /api prefix, forward to the backend.
    location /api/ {
        proxy_pass http://backend_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Static assets — long cache (Vite emits content-hashed filenames).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA history fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
